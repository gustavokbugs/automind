spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:automind}
    username: ${DB_USER:automind}
    password: ${DB_PASS:automind123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:automind-super-secret-key-for-jwt-token-generation-2024}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Configuração do upload de mídias (fotos e vídeos do mecânico)
upload:
  dir: ${UPLOAD_DIR:uploads}          # Diretório local para salvar os arquivos
  base-url: ${UPLOAD_BASE_URL:/uploads} # URL base para acesso público

# Integração com IA (Groq API — gratuita)
# Obtenha sua chave em: https://console.groq.com
# Se não configurada, o sistema usa texto padrão (sem erro)
ia:
  groq:
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:llama3-8b-8192}

logging:
  level:
    com.automind: INFO
    org.springframework.security: WARN
