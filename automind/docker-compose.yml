version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: automind-db
    environment:
      POSTGRES_DB: automind
      POSTGRES_USER: automind
      POSTGRES_PASSWORD: automind123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automind-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: automind
      DB_USER: automind
      DB_PASS: automind123
      JWT_SECRET: automind-super-secret-key-jwt-production-2024
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
      # Integração com IA (Groq) — explicação dos serviços em linguagem simples
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
